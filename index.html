<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LINE 貼圖智慧格式大師 - v1.2.0</title>
    <!-- 載入必要資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root { --vh: 100dvh; }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            background-color: #f1f5f9;
            height: var(--vh);
            overflow: hidden;
            margin: 0;
        }
        #root { height: 100%; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; height: 32px; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 26px; width: 26px;
            border-radius: 50%; background: #2563eb; cursor: pointer;
            box-shadow: 0 4px 10px rgba(37,99,235,0.4); margin-top: -10px; border: 2px solid white;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer; background: #e2e8f0; border-radius: 10px;
        }

        /* 浮動式面板 */
        .floating-sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-radius: 2rem 2rem 0 0;
            box-shadow: 0 -15px 50px rgba(0,0,0,0.5); z-index: 300;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sheet-collapsed { transform: translateY(calc(100% - 48px)); }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        /* 核心修正：圖片工作區與滾動 */
        .workspace {
            position: absolute; top: 56px; left: 0; right: 0; bottom: 48px;
            overflow-y: auto; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            padding: 12px; box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }
        /* 關鍵：容器尺寸跟隨圖片實際顯示尺寸，網格線才會覆蓋完整圖片 */
        .precise-image-container {
            position: relative;
            display: inline-block;
            flex: 0 0 auto;
            max-width: 100%;
            max-height: 100%;
            line-height: 0;
        }
        .precise-image-container img {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: calc(100dvh - 56px - 48px - 24px);
            display: block;
            background: white;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, Fragment } = React;

        const Icon = ({ name, className = "" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
                scissors: <Fragment><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12"/></Fragment>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m-7-11v12m-4-4 4 4 4-4"/>,
                trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6"/>,
                magic: <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M15 12l-2-2m-4 0l4 4"/>,
                grid: <Fragment><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></Fragment>,
                brick: <Fragment><rect width="18" height="14" x="3" y="5" rx="1"/><path d="M3 12h18M7 5v7m10-7v7M12 12v7"/></Fragment>,
                refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V2m0 6h-6m6 4a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v6m0-6h6"/>,
                archive: <path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2m18 0v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0H3m7 5h4"/>,
                box: <Fragment><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></Fragment>,
                folder: <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                check: <path d="M20 6 9 17l-5-5"/>,
                image: <Fragment><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Fragment>,
                cloudDown: <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M12 12v9m-4-4 4 4 4-4"/>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const App = () => {
            const [images, setImages] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isDownloading, setIsDownloading] = useState(false);
            const [tolerance, setTolerance] = useState(70);
            const [slicingId, setSlicingId] = useState(null);
            const [isBatchSliceOpen, setIsBatchSliceOpen] = useState(false);
            const [smartSlicingId, setSmartSlicingId] = useState(null);
            const [smartBoxes, setSmartBoxes] = useState([]);
            const [smartSettings, setSmartSettings] = useState({ threshold: 35, padding: 12, mergeDistance: 34 });
            const [activeSmartBoxId, setActiveSmartBoxId] = useState(null);
            const [grid, setGrid] = useState({ rows: 3, cols: 3 });
            const [isControlExpanded, setIsControlExpanded] = useState(true);
            const fileInputRef = useRef(null);

            const [vLines, setVLines] = useState([]);
            const [hLines, setHLines] = useState([]);
            const imageRef = useRef(null);
            const smartImageRef = useRef(null);

            const isFileSystemSupported = typeof window.showDirectoryPicker === 'function';
            const currentSmartTarget = smartSlicingId ? images.find(i => i.id === smartSlicingId) : null;

            // 初始化與調整網格線
            useEffect(() => {
                const newV = []; for (let i = 1; i < grid.cols; i++) newV.push(i / grid.cols);
                setVLines(newV);
                const newH = []; for (let i = 1; i < grid.rows; i++) newH.push(i / grid.rows);
                setHLines(newH);
            }, [grid.rows, grid.cols, slicingId, isBatchSliceOpen]);

            useEffect(() => {
                if (!currentSmartTarget) {
                    setSmartBoxes([]);
                    return;
                }
                let cancelled = false;
                detectSmartBoxes(currentSmartTarget).then(boxes => {
                    if (!cancelled) setSmartBoxes(boxes);
                });
                return () => { cancelled = true; };
            }, [smartSlicingId, smartSettings.threshold, smartSettings.padding, smartSettings.mergeDistance]);

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImages(prev => [...prev, {
                            id: Math.random().toString(36).substr(2, 9),
                            original: event.target.result,
                            processed: null,
                            name: file.name.replace(/\.[^/.]+$/, ""),
                            status: 'pending'
                        }]);
                    };
                    reader.readAsDataURL(file);
                });
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            // 洪水填充去背 (Flood Fill)
            const removeWhiteBackgroundSmart = (dataUrl, currentTolerance) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width; canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        const w = canvas.width; const h = canvas.height;
                        const visited = new Uint8Array(w * h);
                        const queue = [];
                        const isBg = (idx) => {
                            const r = data[idx], g = data[idx+1], b = data[idx+2];
                            const diff = Math.max(Math.abs(r-255), Math.abs(g-255), Math.abs(b-255));
                            const cd = Math.max(Math.abs(r-g), Math.abs(g-b), Math.abs(r-b));
                            return diff < currentTolerance && cd < 15 && (r+g+b) > 420;
                        };
                        for (let x = 0; x < w; x++) { if (isBg((0 * w + x) * 4)) queue.push(x, 0); if (isBg(((h - 1) * w + x) * 4)) queue.push(x, h - 1); }
                        for (let y = 0; y < h; y++) { if (isBg((y * w + 0) * 4)) queue.push(0, y); if (isBg((y * w + (w - 1)) * 4)) queue.push(w - 1, y); }
                        let head = 0;
                        while (head < queue.length) {
                            const x = queue[head++], y = queue[head++];
                            const pos = y * w + x; if (visited[pos]) continue; visited[pos] = 1;
                            data[pos * 4 + 3] = 0;
                            [[x+1, y], [x-1, y], [x, y+1], [x, y-1]].forEach(([nx, ny]) => {
                                if (nx >= 0 && nx < w && ny >= 0 && ny < h && !visited[ny * w + nx] && isBg((ny * w + nx) * 4)) queue.push(nx, ny);
                            });
                        }
                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.src = dataUrl;
                });
            };

            const downloadSingle = async (dataUrl, name) => {
                try {
                    const response = await fetch(dataUrl);
                    const blob = await response.blob();
                    if (typeof window.showSaveFilePicker === 'function') {
                        const handle = await window.showSaveFilePicker({ suggestedName: `${name}.png`, types: [{ description: 'PNG', accept: {'image/png': ['.png']} }] });
                        const writable = await handle.createWritable();
                        await writable.write(blob); await writable.close();
                    } else {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a'); a.href = url; a.download = `${name}.png`;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    }
                } catch (e) {}
            };

            const downloadAsZip = async () => {
                const ready = images.filter(i => i.processed);
                if (ready.length === 0) return;
                setIsDownloading(true);
                try {
                    const zip = new JSZip();
                    for(const img of ready) {
                        const res = await fetch(img.processed);
                        zip.file(`${img.name}.png`, await res.blob());
                    }
                    const content = await zip.generateAsync({type: "blob"});
                    const url = window.URL.createObjectURL(content);
                    const a = document.createElement('a'); a.href = url; a.download = `stickers_batch_${Date.now()}.zip`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                } finally { setIsDownloading(false); }
            };

            const downloadToFolder = async () => {
                const ready = images.filter(i => i.processed);
                if (ready.length === 0 || !isFileSystemSupported) return;
                try {
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setIsDownloading(true);
                    for (const img of ready) {
                        const file = await handle.getFileHandle(`${img.name}.png`, { create: true });
                        const writable = await file.createWritable();
                        const res = await fetch(img.processed);
                        await writable.write(await res.blob()); await writable.close();
                    }
                } finally { setIsDownloading(false); }
            };

            const handleLineMove = (type, index, e) => {
                if (!imageRef.current) return;
                const rect = imageRef.current.getBoundingClientRect();
                const onMove = (me) => {
                    const cX = me.touches ? me.touches[0].clientX : me.clientX;
                    const cY = me.touches ? me.touches[0].clientY : me.clientY;
                    // 核心修正：計算必須嚴格相對於圖片的渲染寬高，確保藍線不出界
                    const percent = type === 'v' ? (cX - rect.left) / rect.width : (cY - rect.top) / rect.height;
                    const clamped = Math.max(0, Math.min(1, percent));
                    if (type === 'v') {
                        setVLines(prev => { const next = [...prev]; next[index] = clamped; return next.sort((a,b)=>a-b); });
                    } else {
                        setHLines(prev => { const next = [...prev]; next[index] = clamped; return next.sort((a,b)=>a-b); });
                    }
                };
                const onEnd = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onEnd); window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', onEnd); };
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onEnd);
            };

            const loadImage = (src) => new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = src;
            });

            const makeId = () => Math.random().toString(36).substr(2, 9);

            const getAverageCornerColor = (data, w, h) => {
                const samples = [];
                const points = [[0, 0], [w - 1, 0], [0, h - 1], [w - 1, h - 1]];
                points.forEach(([px, py]) => {
                    for (let y = Math.max(0, py - 3); y <= Math.min(h - 1, py + 3); y++) {
                        for (let x = Math.max(0, px - 3); x <= Math.min(w - 1, px + 3); x++) {
                            const idx = (y * w + x) * 4;
                            samples.push([data[idx], data[idx + 1], data[idx + 2]]);
                        }
                    }
                });
                return samples.reduce((acc, color) => [acc[0] + color[0], acc[1] + color[1], acc[2] + color[2]], [0, 0, 0]).map(v => v / samples.length);
            };

            const overlapOrNear = (a, b, gap) => (
                a.x <= b.x + b.w + gap &&
                a.x + a.w + gap >= b.x &&
                a.y <= b.y + b.h + gap &&
                a.y + a.h + gap >= b.y
            );

            const mergeRects = (rects, gap) => {
                let boxes = rects.map(r => ({...r}));
                let changed = true;
                while (changed) {
                    changed = false;
                    outer: for (let i = 0; i < boxes.length; i++) {
                        for (let j = i + 1; j < boxes.length; j++) {
                            if (!overlapOrNear(boxes[i], boxes[j], gap)) continue;
                            const x1 = Math.min(boxes[i].x, boxes[j].x);
                            const y1 = Math.min(boxes[i].y, boxes[j].y);
                            const x2 = Math.max(boxes[i].x + boxes[i].w, boxes[j].x + boxes[j].w);
                            const y2 = Math.max(boxes[i].y + boxes[i].h, boxes[j].y + boxes[j].h);
                            boxes[i] = { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
                            boxes.splice(j, 1);
                            changed = true;
                            break outer;
                        }
                    }
                }
                return boxes;
            };

            const detectSmartBoxes = async (target) => {
                const img = await loadImage(target.processed || target.original);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                const scale = Math.min(1, 1200 / Math.max(img.naturalWidth, img.naturalHeight));
                const w = Math.max(1, Math.round(img.naturalWidth * scale));
                const h = Math.max(1, Math.round(img.naturalHeight * scale));
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                const bg = getAverageCornerColor(data, w, h);
                const mask = new Uint8Array(w * h);
                const step = 2;
                const threshold = smartSettings.threshold;
                for (let y = 0; y < h; y += step) {
                    for (let x = 0; x < w; x += step) {
                        const idx = (y * w + x) * 4;
                        const dr = data[idx] - bg[0];
                        const dg = data[idx + 1] - bg[1];
                        const db = data[idx + 2] - bg[2];
                        if (Math.sqrt(dr * dr + dg * dg + db * db) > threshold && data[idx + 3] > 20) {
                            mask[y * w + x] = 1;
                        }
                    }
                }

                const visited = new Uint8Array(w * h);
                const rects = [];
                for (let y = 0; y < h; y += step) {
                    for (let x = 0; x < w; x += step) {
                        const pos = y * w + x;
                        if (!mask[pos] || visited[pos]) continue;
                        const queue = [[x, y]];
                        visited[pos] = 1;
                        let minX = x, maxX = x, minY = y, maxY = y, count = 0;
                        for (let head = 0; head < queue.length; head++) {
                            const [cx, cy] = queue[head];
                            count++;
                            minX = Math.min(minX, cx); maxX = Math.max(maxX, cx);
                            minY = Math.min(minY, cy); maxY = Math.max(maxY, cy);
                            [[cx + step, cy], [cx - step, cy], [cx, cy + step], [cx, cy - step]].forEach(([nx, ny]) => {
                                if (nx < 0 || nx >= w || ny < 0 || ny >= h) return;
                                const npos = ny * w + nx;
                                if (!mask[npos] || visited[npos]) return;
                                visited[npos] = 1;
                                queue.push([nx, ny]);
                            });
                        }
                        const rw = maxX - minX + step;
                        const rh = maxY - minY + step;
                        if (count >= 8 && rw * rh > 64) rects.push({ x: minX, y: minY, w: rw, h: rh });
                    }
                }

                const merged = mergeRects(rects, smartSettings.mergeDistance).map(rect => {
                    const pad = smartSettings.padding;
                    const x1 = Math.max(0, rect.x - pad);
                    const y1 = Math.max(0, rect.y - pad);
                    const x2 = Math.min(w, rect.x + rect.w + pad);
                    const y2 = Math.min(h, rect.y + rect.h + pad);
                    return {
                        id: makeId(),
                        x: x1 / w,
                        y: y1 / h,
                        w: (x2 - x1) / w,
                        h: (y2 - y1) / h
                    };
                }).filter(box => box.w > 0.025 && box.h > 0.025);

                return merged.sort((a, b) => (Math.floor(a.y * 8) - Math.floor(b.y * 8)) || a.x - b.x);
            };

            const openSmartSlice = (imageId = null) => {
                const targetId = imageId || images[0]?.id;
                if (!targetId) return;
                setSmartSlicingId(targetId);
                setActiveSmartBoxId(null);
                setIsControlExpanded(true);
            };

            const updateSmartSetting = (key, value) => {
                setSmartSettings(prev => ({...prev, [key]: value}));
            };

            const removeSmartBox = (id) => {
                setSmartBoxes(prev => prev.filter(box => box.id !== id));
                setActiveSmartBoxId(null);
            };

            const splitActiveSmartBox = (direction) => {
                if (!activeSmartBoxId) return;
                setSmartBoxes(prev => {
                    const target = prev.find(box => box.id === activeSmartBoxId);
                    if (!target) return prev;
                    const minSize = 0.04;
                    if ((direction === 'vertical' && target.w < minSize * 2) || (direction === 'horizontal' && target.h < minSize * 2)) {
                        return prev;
                    }
                    const gap = 0.003;
                    const first = {...target, id: makeId()};
                    const second = {...target, id: makeId()};
                    if (direction === 'vertical') {
                        first.w = Math.max(minSize, target.w / 2 - gap);
                        second.x = target.x + target.w / 2 + gap;
                        second.w = Math.max(minSize, target.x + target.w - second.x);
                    } else {
                        first.h = Math.max(minSize, target.h / 2 - gap);
                        second.y = target.y + target.h / 2 + gap;
                        second.h = Math.max(minSize, target.y + target.h - second.y);
                    }
                    const next = prev.flatMap(box => box.id === activeSmartBoxId ? [first, second] : [box]);
                    setActiveSmartBoxId(first.id);
                    return next;
                });
            };

            const handleSmartBoxPointer = (id, mode, e) => {
                if (!smartImageRef.current) return;
                e.preventDefault();
                e.stopPropagation();
                setActiveSmartBoxId(id);
                const rect = smartImageRef.current.getBoundingClientRect();
                const startPoint = e.touches ? e.touches[0] : e;
                const startX = (startPoint.clientX - rect.left) / rect.width;
                const startY = (startPoint.clientY - rect.top) / rect.height;
                const startBox = smartBoxes.find(box => box.id === id);
                if (!startBox) return;
                const minSize = 0.02;
                const onMove = (me) => {
                    const point = me.touches ? me.touches[0] : me;
                    const px = (point.clientX - rect.left) / rect.width;
                    const py = (point.clientY - rect.top) / rect.height;
                    const dx = px - startX;
                    const dy = py - startY;
                    setSmartBoxes(prev => prev.map(box => {
                        if (box.id !== id) return box;
                        let next = {...startBox};
                        if (mode === 'move') {
                            next.x = Math.max(0, Math.min(1 - next.w, startBox.x + dx));
                            next.y = Math.max(0, Math.min(1 - next.h, startBox.y + dy));
                        } else {
                            if (mode.includes('l')) {
                                const right = startBox.x + startBox.w;
                                next.x = Math.max(0, Math.min(right - minSize, startBox.x + dx));
                                next.w = right - next.x;
                            }
                            if (mode.includes('r')) {
                                const right = Math.max(startBox.x + minSize, Math.min(1, startBox.x + startBox.w + dx));
                                next.w = right - startBox.x;
                            }
                            if (mode.includes('t')) {
                                const bottom = startBox.y + startBox.h;
                                next.y = Math.max(0, Math.min(bottom - minSize, startBox.y + dy));
                                next.h = bottom - next.y;
                            }
                            if (mode.includes('b')) {
                                const bottom = Math.max(startBox.y + minSize, Math.min(1, startBox.y + startBox.h + dy));
                                next.h = bottom - startBox.y;
                            }
                        }
                        return next;
                    }));
                };
                const onEnd = () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onEnd);
                };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onMove, { passive: false });
                window.addEventListener('touchend', onEnd);
            };

            const executeSmartSlice = async () => {
                if (!currentSmartTarget || smartBoxes.length === 0) return;
                setIsProcessing(true);
                try {
                    const img = await loadImage(currentSmartTarget.processed || currentSmartTarget.original);
                    const allNewSlices = [];
                    const sortedBoxes = [...smartBoxes].sort((a, b) => (Math.floor(a.y * 8) - Math.floor(b.y * 8)) || a.x - b.x);
                    sortedBoxes.forEach((box, index) => {
                        const sx = Math.max(0, Math.floor(box.x * img.naturalWidth));
                        const sy = Math.max(0, Math.floor(box.y * img.naturalHeight));
                        const ex = Math.min(img.naturalWidth, Math.ceil((box.x + box.w) * img.naturalWidth));
                        const ey = Math.min(img.naturalHeight, Math.ceil((box.y + box.h) * img.naturalHeight));
                        const sw = ex - sx;
                        const sh = ey - sy;
                        if (sw <= 1 || sh <= 1) return;
                        const canvas = document.createElement('canvas');
                        canvas.width = sw; canvas.height = sh;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = false;
                        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
                        const dataUrl = canvas.toDataURL('image/png');
                        allNewSlices.push({
                            id: makeId(),
                            original: dataUrl,
                            processed: !!currentSmartTarget.processed ? dataUrl : null,
                            name: `${currentSmartTarget.name}_smart_${String(index + 1).padStart(2, '0')}`,
                            status: !!currentSmartTarget.processed ? 'done' : 'pending'
                        });
                    });
                    setImages(prev => [...prev.filter(i => i.id !== currentSmartTarget.id), ...allNewSlices]);
                } finally {
                    setIsProcessing(false);
                    setSmartSlicingId(null);
                    setActiveSmartBoxId(null);
                }
            };

            const executeSlice = async (targets) => {
                setIsProcessing(true);
                try {
                    const sortedV = [0, ...vLines, 1].sort((a,b)=>a-b);
                    const sortedH = [0, ...hLines, 1].sort((a,b)=>a-b);
                    const allNewSlices = [];
                    for (const target of targets) {
                        const img = await new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = target.processed || target.original; });
                        for (let r = 0; r < sortedH.length - 1; r++) {
                            for (let c = 0; c < sortedV.length - 1; c++) {
                                const sx = Math.ceil(sortedV[c] * img.naturalWidth);
                                const sy = Math.ceil(sortedH[r] * img.naturalHeight);
                                const ex = Math.floor(sortedV[c+1] * img.naturalWidth);
                                const ey = Math.floor(sortedH[r+1] * img.naturalHeight);
                                const sw = ex - sx;
                                const sh = ey - sy;
                                if (sw <= 1 || sh <= 1) continue;
                                const canvas = document.createElement('canvas'); canvas.width = sw; canvas.height = sh;
                                const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled = false; ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
                                allNewSlices.push({ id: Math.random().toString(36).substr(2, 9), original: canvas.toDataURL('image/png'), processed: !!target.processed ? canvas.toDataURL('image/png') : null, name: `${target.name}_${r+1}_${c+1}`, status: !!target.processed ? 'done' : 'pending' });
                            }
                        }
                    }
                    setImages(prev => [...prev.filter(i => !targets.find(t => t.id === i.id)), ...allNewSlices]);
                } finally { setIsProcessing(false); setSlicingId(null); setIsBatchSliceOpen(false); }
            };

            const processAllPending = async () => {
                const pending = images.filter(i => !i.processed);
                if (pending.length === 0) return;
                setIsProcessing(true);
                try {
                    for (const img of pending) {
                        setImages(p => p.map(i => i.id === img.id ? {...i, status: 'processing'} : i));
                        const res = await removeWhiteBackgroundSmart(img.original, tolerance);
                        setImages(p => p.map(i => i.id === img.id ? {...i, processed: res, status: 'done'} : i));
                    }
                } finally { setIsProcessing(false); }
            };

            return (
                <div className="flex flex-col h-full overflow-hidden bg-slate-50">
                    <header className="shrink-0 px-4 sm:px-8 lg:px-14 py-4 sm:py-7 flex items-center justify-between gap-3 sm:gap-4 z-[80]">
                        <div className="flex items-center gap-2.5 sm:gap-3 min-w-0">
                            <Icon name="scissors" className="text-blue-600 w-7 h-7 sm:w-9 sm:h-9 shrink-0" />
                            <h1 className="text-xl sm:text-4xl font-black tracking-tight text-slate-900 truncate">LINE 貼圖智慧格式大師</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => fileInputRef.current?.click()} className="bg-blue-600 text-white px-4 sm:px-9 py-2.5 sm:py-4 rounded-2xl font-black text-sm sm:text-base shadow-xl shadow-blue-600/20 active:scale-95 hover:bg-blue-700 transition-all flex items-center gap-2 shrink-0"><Icon name="upload" className="w-5 h-5" /><span className="hidden sm:inline">上傳貼圖圖片</span><span className="sm:hidden">上傳</span></button>
                        </div>
                        <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" multiple accept="image/*" />
                    </header>

                    <main className={`${images.length === 0 ? 'flex flex-col px-5 sm:px-8 lg:px-14 pb-6 sm:pb-8' : 'overflow-y-auto px-3 sm:px-4 py-3 sm:py-4 pb-20 bg-slate-100'} flex-1`}>
                        {images.length > 0 && !slicingId && !isBatchSliceOpen && (
                            <div className="bg-white rounded-[1.75rem] sm:rounded-[2rem] mb-4 sm:mb-6 shadow-sm border border-slate-200 px-4 sm:px-6 py-3.5 sm:py-4 flex flex-col xl:flex-row xl:items-center gap-3 xl:gap-6 animate-in">
                                <div className="flex items-center gap-2.5 sm:gap-4 flex-1 min-w-[260px]">
                                    <div className="text-left w-14 sm:w-16 shrink-0">
                                        <div className="text-[10px] font-black text-slate-400 leading-none mb-1">去背強度</div>
                                        <div className="text-blue-600 font-black text-3xl sm:text-3xl leading-none font-mono">{tolerance}</div>
                                    </div>
                                    <input type="range" min="1" max="150" value={tolerance} onChange={(e) => setTolerance(parseInt(e.target.value))} className="flex-1 min-w-0" />
                                    <button onClick={processAllPending} disabled={isProcessing} className="bg-blue-600 text-white w-[118px] sm:w-[140px] h-[48px] sm:h-[52px] shrink-0 rounded-2xl text-xs sm:text-sm font-black flex items-center justify-center gap-1.5 sm:gap-2 shadow-lg shadow-blue-600/15 active:scale-95 hover:bg-blue-700 disabled:opacity-60 whitespace-nowrap"><Icon name="magic" className={`w-5 h-5 shrink-0 ${isProcessing ? 'animate-pulse' : ''}`} /> 批次去背</button>
                                </div>
                                <div className="hidden xl:block h-10 w-px bg-slate-100"></div>
                                <div className="flex flex-wrap items-center gap-2.5 sm:gap-3 shrink-0 max-w-full">
                                    <button onClick={() => setIsBatchSliceOpen(true)} className="bg-indigo-50 text-indigo-600 w-[118px] sm:w-[132px] h-[48px] sm:h-[52px] shrink-0 rounded-2xl text-xs sm:text-sm font-black flex items-center justify-center gap-1.5 sm:gap-2 transition-all active:scale-95 hover:bg-indigo-100 shadow-lg shadow-indigo-600/5 whitespace-nowrap"><Icon name="grid" className="w-5 h-5 shrink-0" /> 批次切片</button>
                                    <button onClick={openSmartSlice} className="bg-violet-300 text-white w-[118px] sm:w-[132px] h-[48px] sm:h-[52px] shrink-0 rounded-2xl text-xs sm:text-sm font-black flex items-center justify-center gap-1.5 sm:gap-2 transition-all active:scale-95 hover:bg-violet-400 shadow-lg shadow-violet-300/30 whitespace-nowrap"><Icon name="brick" className="w-5 h-5 shrink-0" /> 智慧切片</button>

                                </div>
                            </div>

                        {images.length === 0 && (

                                    </div>
                                    <div className="p-3 bg-white border-t border-slate-100 flex items-center justify-between gap-2">
                                        <span className="text-[10px] font-bold text-slate-500 truncate flex-1">{img.name}</span>
                                        <div className="flex gap-1.5 shrink-0">
                                            {img.processed ? (

                                            ) : (
                                                <button onClick={async () => {
                                                    setImages(p => p.map(i => i.id === img.id ? {...i, status: 'processing'} : i));
                                                    const res = await removeWhiteBackgroundSmart(img.original, tolerance);
                                                    setImages(p => p.map(i => i.id === img.id ? {...i, processed: res, status: 'done'} : i));
                                                }} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold shadow-sm active:scale-90 transition-all flex items-center gap-1"><Icon name="magic" className="w-3 h-3" /> 去背</button>
                                            )}
                                            <button onClick={() => setSlicingId(img.id)} className="bg-indigo-50 text-indigo-600 p-2.5 rounded-xl active:scale-90 transition-all"><Icon name="grid" className="w-4 h-4" /></button>
                                            <button onClick={() => openSmartSlice(img.id)} className="bg-violet-300 text-white p-2.5 rounded-xl active:scale-90 transition-all hover:bg-violet-400 shadow-sm"><Icon name="brick" className="w-4 h-4" /></button>
                                            <button onClick={() => setImages(i => i.filter(x => x.id !== img.id))} className="bg-slate-100 text-slate-400 p-2.5 rounded-xl active:scale-90 transition-all"><Icon name="trash" className="w-4 h-4" /></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 智慧不規則切片視窗 */}
                    {smartSlicingId && currentSmartTarget && (
                        <div className="fixed inset-0 bg-slate-950 z-[100] flex flex-col touch-none animate-in">
                            <div className="h-14 px-4 border-b border-white/10 flex justify-between items-center text-white shrink-0 z-[160] bg-slate-900">
                                <div className="flex items-center gap-2"><Icon name="magic" className="text-blue-400 w-5 h-5" /><h3 className="font-black text-sm uppercase">智慧不規則切片微調</h3></div>
                                <button onClick={() => {setSmartSlicingId(null); setActiveSmartBoxId(null);}} className="p-2.5 bg-white/10 rounded-full active:bg-white/20"><Icon name="x" className="w-6 h-6" /></button>
                            </div>

                            <div className="workspace">
                                <div className="precise-image-container">
                                    <img
                                        ref={smartImageRef}
                                        src={currentSmartTarget.processed || currentSmartTarget.original}
                                        className="pointer-events-none shadow-2xl"
                                    />
                                    {smartBoxes.map((box, idx) => {
                                        const isActive = activeSmartBoxId === box.id;
                                        const boxColor = isActive ? '#f59e0b' : '#3b82f6';
                                        return (
                                            <div
                                                key={box.id}
                                                onMouseDown={(e) => handleSmartBoxPointer(box.id, 'move', e)}
                                                onTouchStart={(e) => handleSmartBoxPointer(box.id, 'move', e)}
                                                className="absolute border-2 cursor-move touch-none"
                                                style={{
                                                    left: `${box.x * 100}%`,
                                                    top: `${box.y * 100}%`,
                                                    width: `${box.w * 100}%`,
                                                    height: `${box.h * 100}%`,
                                                    zIndex: isActive ? 80 : 30,
                                                    borderColor: boxColor,
                                                    backgroundColor: isActive ? 'rgba(245,158,11,0.16)' : 'rgba(59,130,246,0.10)',
                                                    boxShadow: isActive ? '0 0 0 1px rgba(255,255,255,0.9), 0 0 18px rgba(245,158,11,0.95)' : '0 0 12px rgba(59,130,246,0.9)'
                                                }}
                                            >
                                                <div className="absolute -top-7 left-0 h-6 px-2 rounded text-white text-[10px] font-black flex items-center gap-1 leading-none" style={{ backgroundColor: boxColor }}>
                                                    {idx + 1}
                                                    <button onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); removeSmartBox(box.id); }} onTouchStart={(e) => { e.preventDefault(); e.stopPropagation(); removeSmartBox(box.id); }} className="ml-1 text-white/90">×</button>
                                                </div>
                                                {['tl','tr','bl','br'].map(handle => (
                                                    <div
                                                        key={handle}
                                                        onMouseDown={(e) => handleSmartBoxPointer(box.id, handle, e)}
                                                        onTouchStart={(e) => handleSmartBoxPointer(box.id, handle, e)}
                                                        className="absolute w-6 h-6 bg-white border-2 rounded-full shadow-lg touch-none"
                                                        style={{
                                                            left: handle.includes('l') ? '-12px' : 'auto',
                                                            right: handle.includes('r') ? '-12px' : 'auto',
                                                            top: handle.includes('t') ? '-12px' : 'auto',
                                                            bottom: handle.includes('b') ? '-12px' : 'auto',
                                                            borderColor: boxColor,
                                                            cursor: handle === 'tl' || handle === 'br' ? 'nwse-resize' : 'nesw-resize'
                                                        }}
                                                    />
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className={`floating-sheet ${!isControlExpanded ? 'sheet-collapsed' : ''}`}>
                                <button onClick={() => setIsControlExpanded(!isControlExpanded)} className="w-full h-[48px] flex flex-col items-center justify-center gap-1 hover:bg-slate-50 transition-colors">
                                    <div className="w-10 h-1 bg-slate-200 rounded-full"></div>
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">{isControlExpanded ? '點擊收合面板 (顯示大圖)' : '展開設定面板'}</span>
                                </button>
                                <div className="px-6 pb-12 pt-2 space-y-5 max-w-lg mx-auto">
                                    <div className="grid grid-cols-3 gap-5">
                                        <div className="space-y-1" title="越低越容易把背景以外的淡色筆畫抓進框；太低會產生較多誤判框。"><div className="flex justify-between font-black text-slate-500 text-[10px] uppercase">偵測敏感度: <span className="text-blue-600 text-lg font-mono">{smartSettings.threshold}</span></div><input type="range" min="10" max="120" value={smartSettings.threshold} onChange={e => updateSmartSetting('threshold', parseInt(e.target.value))} /></div>
                                        <div className="space-y-1" title="切片外框往外多留的像素，避免貼圖邊緣或文字被切掉。"><div className="flex justify-between font-black text-slate-500 text-[10px] uppercase">外框留白: <span className="text-blue-600 text-lg font-mono">{smartSettings.padding}</span></div><input type="range" min="0" max="60" value={smartSettings.padding} onChange={e => updateSmartSetting('padding', parseInt(e.target.value))} /></div>
                                        <div className="space-y-1" title="越大越會把人物、文字、裝飾合併成同一個框；太大會把相鄰貼圖黏在一起。"><div className="flex justify-between font-black text-slate-500 text-[10px] uppercase">群組合併: <span className="text-blue-600 text-lg font-mono">{smartSettings.mergeDistance}</span></div><input type="range" min="0" max="100" value={smartSettings.mergeDistance} onChange={e => updateSmartSetting('mergeDistance', parseInt(e.target.value))} /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => splitActiveSmartBox('vertical')} disabled={!activeSmartBoxId} className="bg-amber-50 text-amber-600 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all disabled:opacity-40">左右分割選取框</button>
                                        <button onClick={() => splitActiveSmartBox('horizontal')} disabled={!activeSmartBoxId} className="bg-amber-50 text-amber-600 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all disabled:opacity-40">上下分割選取框</button>
                                    </div>

                                        <button onClick={executeSmartSlice} disabled={smartBoxes.length === 0} className="flex-1 bg-blue-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3 disabled:opacity-50"><Icon name="check" className="w-6 h-6" /> 確認切片生成 ({smartBoxes.length})</button>

                    {/* 切片視窗 - 解決位移核心修正 */}
                    {(slicingId || isBatchSliceOpen) && (
                        <div className="fixed inset-0 bg-slate-950 z-[100] flex flex-col touch-none animate-in">

                                <button onClick={() => setIsControlExpanded(!isControlExpanded)} className="w-full h-[48px] flex flex-col items-center justify-center gap-1 hover:bg-slate-50 transition-colors">
                                    <div className="w-10 h-1 bg-slate-200 rounded-full"></div>
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">{isControlExpanded ? '點擊收合面板 (顯示大圖)' : '展開設定面板'}</span>
                                </button>
                                <div className="px-6 pb-12 pt-2 space-y-6 max-w-lg mx-auto">
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="space-y-1"><div className="flex justify-between font-black text-slate-500 text-[10px] uppercase">列數: <span className="text-blue-600 text-lg font-mono">{grid.cols}</span></div><input type="range" min="1" max="10" value={grid.cols} onChange={e => setGrid(g => ({...g, cols: parseInt(e.target.value)}))} /></div>
                                        <div className="space-y-1"><div className="flex justify-between font-black text-slate-500 text-[10px] uppercase">行數: <span className="text-blue-600 text-lg font-mono">{grid.rows}</span></div><input type="range" min="1" max="10" value={grid.rows} onChange={e => setGrid(g => ({...g, rows: parseInt(e.target.value)}))} /></div>
                                    </div>
                                    <button onClick={() => executeSlice(isBatchSliceOpen ? images : [images.find(i => i.id === slicingId)])} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-lg shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3"><Icon name="check" className="w-6 h-6" /> 確認切片生成</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {(isProcessing || isDownloading) && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[300] flex items-center justify-center animate-in">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl flex flex-col items-center gap-4">
                                <Icon name="refresh" className="animate-spin text-blue-600 w-12 h-12" />
                                <span className="text-sm font-black uppercase tracking-widest">{isDownloading ? "處理下載中..." : "AI 處理中..."}</span>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
