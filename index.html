<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 貼圖智慧大師 - v1.0.0</title>
    <!-- 載入必要資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        [animate-in] { animation: fade-in 0.5s ease-out; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, Fragment } = React;

        // 內建圖標組件 (SVG 修正版)
        const Icon = ({ name, className = "" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m-7-11v12m-4-4 4 4 4-4"/>,
                trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6"/>,
                scissors: (
                    <Fragment>
                        <circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/>
                    </Fragment>
                ),
                grid: (
                    <Fragment>
                        <rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>
                    </Fragment>
                ),
                refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V2m0 6h-6m6 4a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v6m0-6h6"/>,
                folder: <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>,
                archive: <path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2m18 0v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8m18 0H3m7 5h4"/>,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                check: <path d="M20 6 9 17l-5-5"/>,
                alert: <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [images, setImages] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isDownloading, setIsDownloading] = useState(false);
            const [tolerance, setTolerance] = useState(50);
            const [slicingId, setSlicingId] = useState(null);
            const [isBatchSliceOpen, setIsBatchSliceOpen] = useState(false);
            const [grid, setGrid] = useState({ rows: 2, cols: 2 });
            const [errorMsg, setErrorMsg] = useState(null);
            const fileInputRef = useRef(null);

            const isFileSystemSupported = typeof window.showDirectoryPicker === 'function';

            useEffect(() => {
                if (errorMsg) {
                    const timer = setTimeout(() => setErrorMsg(null), 5000);
                    return () => clearTimeout(timer);
                }
            }, [errorMsg]);

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImages(prev => [...prev, {
                            id: Math.random().toString(36).substr(2, 9),
                            original: event.target.result,
                            processed: null,
                            name: file.name.replace(/\.[^/.]+$/, ""),
                            status: 'pending'
                        }]);
                    };
                    reader.readAsDataURL(file);
                });
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            const removeWhiteBackgroundSmart = (dataUrl, currentTolerance) => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onerror = () => reject(new Error("圖片載入失敗"));
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            ctx.drawImage(img, 0, 0);
                            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            const data = imageData.data;
                            const width = canvas.width;
                            const height = canvas.height;
                            const visited = new Uint8Array(width * height);
                            const queue = [];
                            const isWhite = (idx) => {
                                const r = data[idx], g = data[idx+1], b = data[idx+2];
                                return r > 255 - currentTolerance && g > 255 - currentTolerance && b > 255 - currentTolerance;
                            };
                            for (let x = 0; x < width; x++) {
                                if (isWhite((0 * width + x) * 4)) queue.push(x, 0);
                                if (isWhite(((height - 1) * width + x) * 4)) queue.push(x, height - 1);
                            }
                            for (let y = 0; y < height; y++) {
                                if (isWhite((y * width + 0) * 4)) queue.push(0, y);
                                if (isWhite((y * width + (width - 1)) * 4)) queue.push(width - 1, y);
                            }
                            let head = 0;
                            while (head < queue.length) {
                                const x = queue[head++], y = queue[head++];
                                const pos = y * width + x;
                                if (visited[pos]) continue;
                                visited[pos] = 1;
                                data[pos * 4 + 3] = 0;
                                [[x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]].forEach(([nx, ny]) => {
                                    if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                        const nPos = ny * width + nx;
                                        if (!visited[nPos] && isWhite(nPos * 4)) queue.push(nx, ny);
                                    }
                                });
                            }
                            ctx.putImageData(imageData, 0, 0);
                            resolve(canvas.toDataURL('image/png'));
                        } catch (e) { reject(e); }
                    };
                    img.src = dataUrl;
                });
            };

            const executeSlice = async (targets) => {
                if (targets.length === 0) return;
                setIsProcessing(true);
                try {
                    const allNewSlices = [];
                    const idsToRemove = targets.map(t => t.id);
                    for (const target of targets) {
                        const img = await new Promise((res, rej) => {
                            const i = new Image();
                            i.onload = () => res(i);
                            i.src = target.original;
                        });
                        const sliceWidth = img.width / grid.cols;
                        const sliceHeight = img.height / grid.rows;
                        for (let r = 0; r < grid.rows; r++) {
                            for (let c = 0; c < grid.cols; c++) {
                                const canvas = document.createElement('canvas');
                                canvas.width = sliceWidth; canvas.height = sliceHeight;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, c * sliceWidth, r * sliceHeight, sliceWidth, sliceHeight, 0, 0, sliceWidth, sliceHeight);
                                allNewSlices.push({
                                    id: Math.random().toString(36).substr(2, 9),
                                    original: canvas.toDataURL('image/png'),
                                    processed: null,
                                    name: `${target.name}_${r+1}_${c+1}`,
                                    status: 'pending'
                                });
                            }
                        }
                    }
                    setImages(prev => [...prev.filter(i => !idsToRemove.includes(i.id)), ...allNewSlices]);
                } catch (e) { setErrorMsg("切片失敗"); }
                finally { setIsProcessing(false); setSlicingId(null); setIsBatchSliceOpen(false); }
            };

            const startProcessingSingle = async (id) => {
                const target = images.find(img => img.id === id);
                if (!target) return;
                setImages(prev => prev.map(img => img.id === id ? { ...img, status: 'processing' } : img));
                try {
                    const result = await removeWhiteBackgroundSmart(target.original, tolerance);
                    setImages(prev => prev.map(img => img.id === id ? { ...img, processed: result, status: 'done' } : img));
                } catch (e) { setImages(prev => prev.map(img => img.id === id ? { ...img, status: 'error' } : img)); }
            };

            const processAll = async () => {
                const pending = images.filter(img => !img.processed);
                if (pending.length === 0) return;
                setIsProcessing(true);
                try {
                    for (const img of pending) {
                        setImages(prev => prev.map(i => i.id === img.id ? { ...i, status: 'processing' } : i));
                        const result = await removeWhiteBackgroundSmart(img.original, tolerance);
                        setImages(prev => prev.map(i => i.id === img.id ? { ...i, processed: result, status: 'done' } : i));
                    }
                } finally { setIsProcessing(false); }
            };

            const downloadToFolder = async () => {
                const ready = images.filter(img => img.processed);
                if (ready.length === 0) return;
                try {
                    const directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setIsDownloading(true);
                    for (const img of ready) {
                        const fileHandle = await directoryHandle.getFileHandle(`${img.name}.png`, { create: true });
                        const writable = await fileHandle.createWritable();
                        const response = await fetch(img.processed);
                        const blob = await response.blob();
                        await writable.write(blob);
                        await writable.close();
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') setErrorMsg("權限不足或系統限制，請使用 ZIP 下載。");
                } finally { setIsDownloading(false); }
            };

            const downloadAsZip = async () => {
                const ready = images.filter(img => img.processed);
                if (ready.length === 0) return;
                setIsDownloading(true);
                try {
                    const zip = new JSZip();
                    for (const img of ready) {
                        const response = await fetch(img.processed);
                        const blob = await response.blob();
                        zip.file(`${img.name}.png`, blob);
                    }
                    const content = await zip.generateAsync({ type: "blob" });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = `stickers_${Date.now()}.zip`;
                    link.click();
                } catch (e) { setErrorMsg("打包失敗"); }
                finally { setIsDownloading(false); }
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-900 relative">
                    {errorMsg && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[1000] bg-red-500 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
                            <Icon name="alert" className="w-6 h-6" />
                            <span className="font-bold">{errorMsg}</span>
                            <button onClick={() => setErrorMsg(null)} className="ml-4 hover:opacity-70"><Icon name="x" size={20}/></button>
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto">
                        <header className="flex flex-col md:flex-row items-center justify-between mb-8 gap-6">
                            <div className="text-center md:text-left">
                                <h1 className="text-4xl font-black flex items-center justify-center md:justify-start gap-3">
                                    <Icon name="scissors" className="text-blue-600 w-10 h-10" />
                                    LINE 貼圖智慧大師
                                </h1>
                                <p className="text-slate-500 mt-2 font-medium flex items-center justify-center md:justify-start gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500"></span>
                                    穩定隨身版：包含完整智慧去背與切片
                                </p>
                            </div>
                            <button onClick={() => fileInputRef.current?.click()} className="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-3xl font-bold text-lg flex items-center gap-3 transition-all shadow-xl active:scale-95">
                                <Icon name="upload" /> 上傳貼圖圖片
                            </button>
                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" multiple accept="image/*" />
                        </header>

                        {images.length > 0 && !slicingId && !isBatchSliceOpen && (
                            <div className="bg-white p-6 rounded-[2.5rem] mb-10 shadow-sm border border-slate-100 flex flex-wrap items-center justify-between gap-8">
                                <div className="flex items-center gap-8 flex-1 min-w-[300px]">
                                    <div className="flex flex-col shrink-0">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">去背強度</span>
                                        <span className="text-blue-600 font-black text-3xl font-mono">{tolerance}</span>
                                    </div>
                                    <input type="range" min="1" max="150" value={tolerance} onChange={(e) => setTolerance(parseInt(e.target.value))} className="flex-1 h-3 bg-slate-100 rounded-full appearance-none cursor-pointer accent-blue-600" />
                                </div>
                                <div className="flex items-center gap-3 flex-wrap">
                                    <button onClick={() => setIsBatchSliceOpen(true)} className="bg-indigo-50 text-indigo-600 px-6 py-4 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all"><Icon name="grid" className="w-5 h-5" /> 批次切片</button>
                                    <div className="w-[1px] h-10 bg-slate-100 mx-2 hidden md:block"></div>
                                    <button onClick={processAll} disabled={isProcessing || isDownloading} className="bg-slate-900 text-white px-8 py-4 rounded-2xl text-sm font-bold flex items-center gap-2 hover:bg-slate-800 disabled:opacity-50 shadow-lg transition-all">{isProcessing ? <Icon name="refresh" className="animate-spin w-5 h-5" /> : <Icon name="refresh" className="w-5 h-5" />} 批次去背</button>
                                    <button onClick={downloadToFolder} disabled={!isFileSystemSupported || isDownloading} className={`px-6 py-4 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all shadow-md ${!isFileSystemSupported ? 'bg-slate-100 text-slate-400' : 'bg-green-600 hover:bg-green-700 text-white'}`}><Icon name="folder" className="w-5 h-5" /> {isFileSystemSupported ? "存至資料夾" : "不支援本機路徑"}</button>
                                    <button onClick={downloadAsZip} disabled={isDownloading} className="bg-amber-500 text-white px-6 py-4 rounded-2xl text-sm font-bold flex items-center gap-2 hover:bg-amber-600 transition-all shadow-md"><Icon name="archive" className="w-5 h-5" /> 打包 ZIP</button>
                                    <button onClick={() => setImages([])} className="p-4 bg-red-50 text-red-400 rounded-2xl hover:bg-red-500 hover:text-white"><Icon name="trash" className="w-6 h-6" /></button>
                                </div>
                            </div>
                        )}

                        {(slicingId || isBatchSliceOpen) && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                <div className="bg-white rounded-[3rem] max-w-5xl w-full max-h-[95vh] overflow-hidden shadow-2xl flex flex-col">
                                    <div className="p-8 border-b flex justify-between items-center">
                                        <h3 className="text-2xl font-black flex items-center gap-3"><Icon name="grid" className="w-8 h-8 text-blue-600" /> 切片設定</h3>
                                        <button onClick={() => {setSlicingId(null); setIsBatchSliceOpen(false);}} className="p-4 hover:bg-slate-100 rounded-full transition-all text-slate-400"><Icon name="x" className="w-8 h-8" /></button>
                                    </div>
                                    <div className="flex-1 overflow-auto p-10 flex flex-col lg:flex-row gap-12">
                                        <div className="flex-1 bg-slate-50 rounded-[2.5rem] p-8 flex items-center justify-center min-h-[400px]">
                                            <div className="relative bg-white shadow-2xl rounded-xl overflow-hidden border-[10px] border-white max-w-full">
                                                <img src={slicingId ? images.find(i => i.id === slicingId)?.original : images.find(i => !i.processed)?.original} className="max-w-full h-auto block opacity-30" />
                                                <div className="absolute inset-0 grid" style={{ gridTemplateColumns: `repeat(${grid.cols}, 1fr)`, gridTemplateRows: `repeat(${grid.rows}, 1fr)` }}>
                                                    {Array.from({ length: grid.rows * grid.cols }).map((_, i) => (
                                                        <div key={i} className="border-2 border-blue-500/50 bg-blue-500/5 flex items-center justify-center"><span className="bg-white/95 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center font-black shadow-sm text-xs">{i+1}</span></div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="w-full lg:w-80 flex flex-col justify-between">
                                            <div className="space-y-8">
                                                <div className="bg-slate-50 p-6 rounded-3xl">
                                                    <div className="flex justify-between mb-3"><span className="font-black text-slate-500 text-xs">列數 (Cols)</span><span className="text-blue-600 font-bold">{grid.cols}</span></div>
                                                    <input type="range" min="1" max="10" value={grid.cols} onChange={e => setGrid(g => ({...g, cols: parseInt(e.target.value)}))} className="w-full h-2 accent-blue-600" />
                                                </div>
                                                <div className="bg-slate-50 p-6 rounded-3xl">
                                                    <div className="flex justify-between mb-3"><span className="font-black text-slate-500 text-xs">行數 (Rows)</span><span className="text-blue-600 font-bold">{grid.rows}</span></div>
                                                    <input type="range" min="1" max="10" value={grid.rows} onChange={e => setGrid(g => ({...g, rows: parseInt(e.target.value)}))} className="w-full h-2 accent-blue-600" />
                                                </div>
                                            </div>
                                            <button onClick={() => executeSlice(isBatchSliceOpen ? images.filter(i => !i.processed) : [images.find(i => i.id === slicingId)])} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-[2rem] font-black text-xl shadow-2xl mt-8 active:scale-95 transition-all flex items-center justify-center gap-2">全部套用並切片 <Icon name="check" className="w-6 h-6" /></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 pb-32">
                            {images.map((img) => (
                                <div key={img.id} className="bg-white rounded-[2.5rem] overflow-hidden border border-slate-100 hover:shadow-2xl transition-all duration-500 group relative">
                                    <div className="aspect-square relative flex items-center justify-center p-8 bg-slate-50/50 overflow-hidden">
                                        {img.processed && <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'conic-gradient(#000 0.25turn, #ccc 0.25turn 0.5turn, #000 0.5turn 0.75turn, #ccc 0.75turn)', backgroundSize: '20px 20px'}}></div>}
                                        <img src={img.processed || img.original} className="max-w-full max-h-full object-contain relative z-10 transition-transform duration-700 group-hover:scale-110" />
                                        {img.status === 'processing' && (
                                            <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-20 flex flex-col items-center justify-center"><Icon name="refresh" className="animate-spin text-blue-600 mb-4 w-12 h-12" /></div>
                                        )}
                                    </div>
                                    <div className="p-6">
                                        <span className="text-sm font-black text-slate-800 block truncate mb-5">{img.name}</span>
                                        <div className="flex items-center gap-2">
                                            {img.processed ? (
                                                <button onClick={() => { const a = document.createElement('a'); a.href = img.processed; a.download = `${img.name}.png`; a.click(); }} className="flex-1 bg-green-50 text-green-600 py-3.5 rounded-2xl font-black text-xs flex items-center justify-center gap-2 hover:bg-green-500 hover:text-white shadow-sm"><Icon name="download" size={16} /> 下載</button>
                                            ) : (
                                                <button onClick={() => startProcessingSingle(img.id)} disabled={isProcessing} className="flex-1 bg-blue-600 text-white py-3.5 rounded-2xl font-black text-xs flex items-center justify-center gap-2 hover:bg-blue-700 disabled:opacity-50 shadow-md"><Icon name="scissors" size={16} /> 智慧去背</button>
                                            )}
                                            <button onClick={() => setSlicingId(img.id)} className="p-3.5 bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-600 hover:text-white"><Icon name="grid" size={20} /></button>
                                            <button onClick={() => setImages(i => i.filter(x => x.id !== img.id))} className="p-3.5 bg-slate-50 text-slate-400 rounded-2xl hover:bg-red-500 hover:text-white"><Icon name="trash" size={20} /></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {images.length === 0 && (
                            <div onClick={() => fileInputRef.current?.click()} className="border-8 border-dashed border-slate-200 rounded-[4rem] p-32 flex flex-col items-center justify-center text-slate-400 hover:border-blue-300 hover:bg-white transition-all cursor-pointer group">
                                <Icon name="upload" className="mb-10 opacity-20 group-hover:text-blue-500 group-hover:opacity-100 transition-all w-32 h-32" />
                                <h2 className="text-4xl font-black text-slate-700 mb-4 tracking-tight text-center">點擊此處上傳貼圖圖片</h2>
                                <p className="text-slate-400 font-medium text-center max-w-sm text-lg leading-relaxed">
                                    建議使用 Chrome 或 Edge 以支援「存至資料夾」功能。
                                </p>
                            </div>
                        )}
                    </div>
                    {(isProcessing || isDownloading) && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-6 rounded-[2.5rem] shadow-2xl flex items-center gap-6 z-[200]">
                            <Icon name="refresh" className="animate-spin text-blue-400 w-8 h-8" />
                            <span className="text-sm font-black uppercase tracking-widest">{isDownloading ? "儲存檔案中..." : "系統運算中..."}</span>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
